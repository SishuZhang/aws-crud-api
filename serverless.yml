service: aws-crud-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-2'}
  environment:
    NODE_ENV: ${self:provider.stage}
    ORDERS_TABLE: ${self:service}-${self:provider.stage}-orders
    PRODUCTS_TABLE: ${self:service}-${self:provider.stage}-products
  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      maxAge: 3600
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.ORDERS_TABLE}"
            - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.PRODUCTS_TABLE}"
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource:
            - "arn:aws:logs:${self:provider.region}:*:log-group:/aws/lambda/*"
        - Effect: Allow
          Action:
            - apigateway:*
          Resource:
            - "arn:aws:apigateway:${self:provider.region}::/*"

functions:
  createOrder:
    handler: src/handlers/create.handler
    timeout: 30
    events:
      - httpApi:
          path: /orders
          method: post

  getOrder:
    handler: src/handlers/get.handler
    timeout: 30
    events:
      - httpApi:
          path: /orders/{orderId}
          method: get

  listOrders:
    handler: src/handlers/list.handler
    timeout: 30
    events:
      - httpApi:
          path: /orders
          method: get

  updateOrder:
    handler: src/handlers/update.handler
    timeout: 30
    events:
      - httpApi:
          path: /orders/{orderId}
          method: put

  deleteOrder:
    handler: src/handlers/delete.handler
    timeout: 30
    events:
      - httpApi:
          path: /orders/{orderId}
          method: delete

  initializeProducts:
    handler: src/handlers/initializeProducts.handler
    timeout: 30

resources:
  Resources:
    OrdersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.ORDERS_TABLE}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    ProductsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.PRODUCTS_TABLE}
        AttributeDefinitions:
          - AttributeName: productName
            AttributeType: S
        KeySchema:
          - AttributeName: productName
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    CloudWatchLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/${self:service}-${self:provider.stage}
        RetentionInDays: 30

    CloudWatchAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-error-alarm-${self:provider.stage}
        AlarmDescription: Alarm for Lambda function errors
        MetricName: Errors
        Namespace: AWS/Lambda
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanThreshold
        Dimensions:
          - Name: FunctionName
            Value: ${self:service}-${self:provider.stage}
        AlarmActions:
          - !Ref CloudWatchAlarmTopic

    CloudWatchAlarmTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: ${self:service}-alarm-topic-${self:provider.stage}

plugins:
  - serverless-offline
  - serverless-dotenv-plugin

custom:
  serverless-offline:
    httpPort: 8000
    host: localhost 